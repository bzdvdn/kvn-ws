# @sk-task foundation#T4.1: CI pipeline (AC-005)
name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./src/...
      - name: Vet
        run: go vet ./src/...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Build
        run: go build ./src/...
      - name: Build binaries
        run: ./scripts/build.sh
