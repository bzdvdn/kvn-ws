# @sk-task foundation#T4.1: CI pipeline (AC-005)
# @sk-task performance-and-polish#T4.2: add gatetest routing step (AC-008)
name: CI

on:
  push:
    branches-ignore:
      - "revert-*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/internal/webui/frontend/package-lock.json
      - name: Build frontend
        run: |
          cd src/internal/webui/frontend
          npm ci
          npm run build
      - name: Test with race detector
        run: go test -race ./src/...
      - name: Vet
        run: go vet ./src/...
      - name: Gosec
        uses: securego/gosec@master
        with:
          args: -exclude=G103 ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
      - name: Build
        run: go build ./src/...
      - name: Build binaries
        run: ./scripts/build.sh both
      - name: Gatetest routing
        run: go run ./src/cmd/gatetest/ --mode routing

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Generate protocol types
        run: go run ./protocol/codegen/
      - name: Make gradlew executable
        run: chmod +x src/android/gradlew
      - name: Generate debug keystore for CI
        run: |
          keytool -genkey -v \
            -keystore /tmp/kvn-ci.keystore \
            -alias kvn -keyalg RSA -keysize 2048 \
            -validity 365 \
            -storepass android -keypass android \
            -dname "CN=KVN-CI, OU=CI, O=KVN, L=Unknown, ST=Unknown, C=Unknown"
          cat > src/android/keystore.properties <<EOF
          storePassword=android
          keyPassword=android
          keyAlias=kvn
          storeFile=/tmp/kvn-ci.keystore
          EOF
      - name: Build APK (release)
        run: |
          cd src/android
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kvn-android-apk
          path: src/android/app/build/outputs/apk/release/kvn-client-release.apk
          retention-days: 30

  release:
    if: |
      startsWith(github.ref, 'refs/tags/v')
      || github.event_name == 'workflow_dispatch'
    needs: [ci, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git rev-parse "${{ steps.tag.outputs.ref }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.tag.outputs.tag }} does not exist. Create it first:"
            echo "  git tag ${{ steps.tag.outputs.tag }}"
            echo "  git push origin ${{ steps.tag.outputs.tag }}"
            exit 1
          fi
        shell: bash

      - name: Checkout tag
        run: git checkout "${{ steps.tag.outputs.ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          cd src/internal/webui/frontend
          npm ci
          npm run build
      - name: Build release binaries
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            os=${platform%%/*}
            arch=${platform#*/}
            suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            echo "Building $os/$arch..."
            mkdir -p "dist/kvn-$os-$arch"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -ldflags="-s -w" \
              -o "dist/kvn-$os-$arch/client${suffix}" ./src/cmd/client
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -ldflags="-s -w" \
              -o "dist/kvn-$os-$arch/server${suffix}" ./src/cmd/server
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -ldflags="-s -w" \
              -o "dist/kvn-$os-$arch/kvn-web${suffix}" ./src/cmd/web
            if [ "$os" = "linux" ]; then
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                go build -ldflags="-s -w" \
                -o "dist/kvn-$os-$arch/relay${suffix}" ./src/cmd/relay
            fi
          done

      - name: Copy install scripts to dist
        run: |
          for dir in dist/kvn-*; do
            [ -d "$dir" ] || continue
            if echo "$dir" | grep -q windows; then
              cp scripts/install-web.ps1 "$dir/"
            else
              cp scripts/install-web.sh "$dir/"
              cp scripts/install-server.sh "$dir/"
              cp scripts/install-client.sh "$dir/"
              cp scripts/install-relay.sh "$dir/" 2>/dev/null || true
              cp scripts/kvn-web.service "$dir/" 2>/dev/null || true
              cp scripts/kvn-web.plist "$dir/" 2>/dev/null || true
            fi
          done
          cp scripts/install-server.sh dist/
          cp scripts/install-client.sh dist/
          cp scripts/install-web.sh dist/
          cp scripts/install-web.ps1 dist/
          cp scripts/install-client.ps1 dist/
      - name: Package archives
        run: |
          cd dist
          for dir in kvn-*; do
            [ -d "$dir" ] || continue
            if echo "$dir" | grep -q windows; then
              zip -r "${dir}.zip" "$dir"
            else
              tar czf "${dir}.tar.gz" "$dir"
            fi
          done
          rm -rf kvn-*/

      - name: Download APK from android job
        uses: actions/download-artifact@v4
        with:
          name: kvn-android-apk
          path: /tmp/apk

      - name: Copy APK to dist
        run: |
          find /tmp/apk -name '*.apk' -exec cp {} dist/ \;
          ls -lh dist/*.apk

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in *; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
          echo "Checksums:"
          cat *.sha256

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "notes<<EOFNOTES"
            echo "## KVN-WS ${{ steps.tag.outputs.tag }}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | Archive | SHA256 |"
            echo "|----------|---------|--------|"
            for f in dist/*.tar.gz dist/*.zip; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              hash=$(sha256sum "$f" | cut -d' ' -f1)
              echo "| ${name} | \`${name}\` | \`${hash}\` |"
            done
            for f in dist/*.apk; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              hash=$(sha256sum "$f" | cut -d' ' -f1)
              echo "| 📱 Android APK | \`${name}\` | \`${hash}\` |"
            done
            echo ""
            if [ -f CHANGELOG.md ]; then
              echo "### Changelog"
              echo ""
              grep -A 100 "^## \[${{ steps.tag.outputs.tag }}" CHANGELOG.md \
                | sed '/^## \[/q' | head -n -1 || true
            fi
            echo "EOFNOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release view "${{ steps.tag.outputs.tag }}" --json id 2>/dev/null && \
            gh release delete "${{ steps.tag.outputs.tag }}" --yes || \
            echo "Release does not exist yet, skipping delete."
          git push origin --delete "refs/tags/${{ steps.tag.outputs.tag }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-beta') || contains(steps.tag.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true
          generate_release_notes: false
