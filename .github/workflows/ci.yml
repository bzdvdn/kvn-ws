# @sk-task foundation#T4.1: CI pipeline (AC-005)
# @sk-task performance-and-polish#T4.2: add gatetest routing step (AC-008)
name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Test with race detector
        run: go test -race ./src/...
      - name: Vet
        run: go vet ./src/...
      - name: Gosec
        uses: securego/gosec@master
        with:
          args: ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
      - name: Build
        run: go build ./src/...
      - name: Build binaries
        run: ./scripts/build.sh
      - name: Gatetest routing
        run: go run ./src/cmd/gatetest/ --mode routing
