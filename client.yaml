server: wss://server:443/tunnel
auth:
  token: 78e8af30989e236ddbf7a302d2850d4e
obfuscation:
  enabled: true
  utls:
    enabled: true
    fallback: true
  padding:
    enabled: true
    size: 512
tls:
  verify_mode: insecure
  ca_file: ""
  server_name: server
  sni:
    - www.cloudflare.com
    - www.google.com
mtu: 1400
ipv6: false
max_message_size: 10485760
tunnel_timeout: 30
proxy_max_concurrency: 1000
proxy_connections: 10
auto_reconnect: true
log:
  level: debug
mode: proxy
transparent: true
proxy_listen: 127.0.0.1:2310
routing:
  default_route: server
  include_ranges: []
  exclude_ranges:
    - 192.168.0.0/16
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
