server: wss://server:443/tunnel
auth:
  token: your-token-here
obfuscation:
  enabled: true
  utls:
    enabled: true
    fallback: true
  padding:
    enabled: true
    size: 512
tls:
  verify_mode: verify
  ca_file: /etc/kvn-ws/certs/ca.pem
  server_name: server
  sni:
    - www.cloudflare.com
    - www.google.com
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
mode: proxy
proxy_listen: 127.0.0.1:2310
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
