<!-- @sk-task docs-and-release#T1.3: standalone client example config (AC-005) -->
<!-- @sk-task production-gap#T2.3: root client demo trusts mounted CA bundle (AC-003) -->
server: wss://server:443/tunnel
auth:
  token: your-token-here
tls:
  verify_mode: verify
  ca_file: /etc/kvn-ws/certs/ca.pem
  server_name: server
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
