server: wss://server:443/tunnel
auth:
  token: your-token-here
tls:
  verify_mode: verify
  ca_file: /etc/kvn-ws/certs/ca.pem
  server_name: server
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
mode: proxy
proxy_listen: 127.0.0.1:2310
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
