server: wss://example.com/tunnel
auth:
  token: your-token-here
obfuscation:
  enabled: true
  utls:
    enabled: true
    fallback: true
  padding:
    enabled: true
    size: 512
tls:
  verify_mode: verify
  ca_file: ""
  server_name: example.com
  sni:
    - www.cloudflare.com
    - www.google.com
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
max_message_size: 10485760
tunnel_timeout: 30
proxy_max_concurrency: 1000
crypto:
  enabled: false
  key: ""
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
