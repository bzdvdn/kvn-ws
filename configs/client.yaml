server: wss://example.com/tunnel
auth:
  token: your-token-here
tls:
  verify_mode: verify
  ca_file: ""
  server_name: example.com
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
