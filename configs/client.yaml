server: wss://example.com/tunnel
auth:
  token: your-token-here
obfuscation:
  enabled: true
  utls:
    enabled: true
    fallback: true
  padding:
    enabled: true
    size: 512
tls:
  verify_mode: verify
  ca_file: ""
  server_name: example.com
  sni:
    - www.cloudflare.com
    - www.google.com
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
max_message_size: 10485760
tunnel_timeout: 30
proxy_max_concurrency: 1000
crypto:
  enabled: false
  key: ""
# dns_proxy:
#   listen: "127.0.0.54:53"
#   upstreams:
#     - "1.1.1.1:53"
#     - "8.8.8.8:53"
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
  # dns_routing:
  #   enabled: true
  #   ttl: 60

