listen: :443
tls:
  cert: ""
  key: ""
  min_version: "1.3"
network:
  pool_ipv4:
    subnet: 10.10.0.0/24
    gateway: 10.10.0.1
    range_start: 10.10.0.10
    range_end: 10.10.0.200
session:
  max_clients: 10
  idle_timeout_sec: 60
auth:
  mode: token
  tokens:
    - test-token
logging:
  level: debug
