listen: :443
pong_timeout: 120s
ws_paths:
  - /tunnel
  - /api/v1/events
obfuscation:
  enabled: true
  padding:
    enabled: true
    size: 512
tls:
  cert: cert.pem
  key: key.pem
  min_version: "1.3"
  client_ca_file: ""
  client_auth: ""
network:
  pool_ipv4:
    subnet: 10.10.0.0/24
    gateway: 10.10.0.1
  pool_ipv6:
    subnet: fd00::/112
    gateway: fd00::1
session:
  max_clients: 100
  idle_timeout_sec: 120
rate_limiting:
  packets_per_sec: 5000
auth:
  mode: token
  tokens:
    - name: default
      secret: your-token-here
      bandwidth_bps: 0
      max_sessions: 0
origin:
  allow_empty: true
crypto:
  enabled: false
  key: ""
# dns_upstreams:
#   - "1.1.1.1:53"
#   - "8.8.8.8:53"
logging:
  level: info
