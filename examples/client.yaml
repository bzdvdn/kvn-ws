<!-- @sk-task docs-and-release#T1.3: standalone client example config (AC-005) -->
<!-- @sk-task production-gap#T2.3: client example trusts mounted CA bundle (AC-003) -->
<!-- @sk-task whitelist-obfuscation#T3.2: obfuscation block example (AC-005) -->
server: wss://server:443/tunnel
transport: quic
obfuscation:
  enabled: true
  utls:
    enabled: true
    fallback: true
  padding:
    enabled: true
    size: 512
auth:
  token: your-token-here
tls:
  verify_mode: verify
  ca_file: /etc/kvn-ws/certs/ca.pem
  server_name: server
  sni:
    - www.cloudflare.com
    - www.google.com
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
crypto:
  enabled: false
  key: ""
routing:
  default_route: server
  include_ranges: []
  exclude_ranges: []
  include_ips: []
  exclude_ips: []
  include_domains: []
  exclude_domains: []
