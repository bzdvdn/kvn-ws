mode: tun
server: wss://relay:8443/tunnel
transport: tcp
# Obfuscation disabled — relay is an opaque pipe; padding would be forwarded upstream
# and corrupt frame decoding on the server side.
auth:
  token: your-token-here
tls:
  verify_mode: insecure
mtu: 1400
ipv6: false
auto_reconnect: true
log:
  level: info
