<!-- @sk-task docs-and-release#T1.3: standalone server example config (AC-005) -->
listen: :443
tls:
  cert: /etc/kvn-ws/cert.pem
  key: /etc/kvn-ws/key.pem
  min_version: "1.3"
network:
  pool_ipv4:
    subnet: 10.10.0.0/24
    gateway: 10.10.0.1
  pool_ipv6:
    subnet: fd00::/112
    gateway: fd00::1
session:
  max_clients: 100
  idle_timeout_sec: 120
auth:
  mode: token
  tokens:
    - name: default
      secret: your-token-here
      bandwidth_bps: 0
      max_sessions: 0
origin:
  allow_empty: true
logging:
  level: info
