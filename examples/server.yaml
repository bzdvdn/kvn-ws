<!-- @sk-task docs-and-release#T1.3: standalone server example config (AC-005) -->
<!-- @sk-task production-gap#T2.3: server example reads runtime-generated cert material (AC-003) -->
listen: :443
tls:
  cert: /etc/kvn-ws/certs/server.pem
  key: /etc/kvn-ws/certs/server-key.pem
  min_version: "1.3"
  client_ca_file: ""
  client_auth: ""
network:
  pool_ipv4:
    subnet: 10.10.0.0/24
    gateway: 10.10.0.1
  pool_ipv6:
    subnet: fd00::/112
    gateway: fd00::1
session:
  max_clients: 100
  idle_timeout_sec: 120
auth:
  mode: token
  tokens:
    - name: default
      secret: your-token-here
      bandwidth_bps: 0
      max_sessions: 0
origin:
  allow_empty: true
logging:
  level: info
admin:
  enabled: true
  listen: localhost:8443
  token: your-admin-token-here
