# @sk-task relay-terminator#T4.1: terminator relay config (AC-001, AC-002)
mode: relay
server: wss://server:443/tunnel
transport: quic  # upstream transport: tcp or quic

relay:
  mode: terminator
  listen: 0.0.0.0:8443
  ws_paths:
    - /tunnel
  max_connections: 200
  quic:
    keep_alive: 7
    idle_timeout: 60
  routing:
    direct_ranges:
      - 10.10.0.0/24
      - 192.168.0.0/16
    direct_domains:
      - .internal.example
      - .local
    direct_sources:
      - geoip: "ru"
      - geosite: "yandex"
      - url: "https://example.com/custom-ips.txt"
    geoip_url: "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat"
    geosite_url: "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat"
    source_ttl_hours: 24
    dns:
      upstreams:
        - "1.1.1.1:53"
      cache_ttl: 60
      transparent: false
  network:
    pool_ipv4:
      subnet: 172.16.0.0/24
      gateway: 172.16.0.1

upstream_token: your-upstream-token  # or env KVN_RELAY_AUTH_TOKEN
obfuscation:
  enabled: true                      # QUIC upstream uses ObfuscatedQUICConn
  padding:
    enabled: true
    size: 512
crypto:
  key: relay-master-key              # for handshake with clients

auth:
  tokens:
    - name: default
      secret: your-token-here
      bandwidth_bps: 0
      max_sessions: 0
tls:
  verify_mode: insecure
log:
  level: info
