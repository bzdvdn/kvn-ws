# @sk-task docs-and-release#T1.3: standalone docker-compose example (AC-005) -->
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "443:443"
    privileged: true
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./server.yaml:/etc/kvn-ws/server.yaml
      - ./cert.pem:/etc/kvn-ws/cert.pem
      - ./key.pem:/etc/kvn-ws/key.pem
    command: ["--config", "/etc/kvn-ws/server.yaml"]
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - server
    privileged: true
    entrypoint: ["/usr/local/bin/client"]
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./client.yaml:/etc/kvn-ws/client.yaml
    command: ["--config", "/etc/kvn-ws/client.yaml"]
    restart: unless-stopped

  client2:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - server
    privileged: true
    entrypoint: ["/usr/local/bin/client"]
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./client.yaml:/etc/kvn-ws/client.yaml
    command: ["--config", "/etc/kvn-ws/client.yaml"]
    restart: unless-stopped
