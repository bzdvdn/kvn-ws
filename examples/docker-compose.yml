# @sk-task docs-and-release#T1.3: standalone docker-compose example (AC-005) -->
# @sk-task production-gap#T2.3: example compose uses runtime-generated cert volume (AC-003)
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "443:443"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./server.yaml:/etc/kvn-ws/server.yaml
      - ./certs:/etc/kvn-ws/certs:ro
    command: ["--config", "/etc/kvn-ws/server.yaml"]
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - server
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    entrypoint: ["/usr/local/bin/client"]
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./client.yaml:/etc/kvn-ws/client.yaml
      - ./certs:/etc/kvn-ws/certs:ro
    command: ["--config", "/etc/kvn-ws/client.yaml"]
    restart: unless-stopped

  client2:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - server
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    entrypoint: ["/usr/local/bin/client"]
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./client.yaml:/etc/kvn-ws/client.yaml
      - ./certs:/etc/kvn-ws/certs:ro
    command: ["--config", "/etc/kvn-ws/client.yaml"]
    restart: unless-stopped
